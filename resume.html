<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷</title>

<style>
body{
    margin:0;
    font-family: "Segoe UI", sans-serif;
    background:#f3f4f6;
    color:#333;
}

/* ===== 上方區塊 ===== */
.hero{
    background:#e5e7eb;
    padding:30px 0;
}

.hero-inner{
    max-width:1000px;
    margin:auto;
    display:flex;
    align-items:center;
}

/* 頭像 */
.profile-img{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    margin-right:20px;
}

/* 名字 */
.name{
    font-size:28px;
    font-weight:bold;
}

/* 副標 */
.subtitle{
    color:#555;
    margin:5px 0;
}

/* tag */
.tags{
    margin-top:10px;
}

.tag{
    display:inline-block;
    background:#d1d5db;
    color:#333;
    padding:5px 12px;
    border-radius:20px;
    font-size:13px;
    margin-right:8px;
}

/* ===== 內容區 ===== */
.container{
    max-width:1000px;
    margin:20px auto;
    padding:0 20px;
}

/* 卡片 */
.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.section-title{
    font-weight:bold;
    margin-bottom:10px;
}

/* 列表 */
ul{
    margin:0;
    padding-left:18px;
}

/* 聯絡 */
.contact p{
    margin:5px 0;
}

</style>
</head>

<body>

<!-- 上方 -->
<div class="hero">
    <div class="hero-inner">
        <img src="images/tsay.jpg" class="profile-img">

        <div>
            <div class="name">王小明</div>
            <div class="subtitle">亞洲大學 ｜ 學號 AU114001001</div>
            <div class="subtitle">產品企劃專員（示意）</div>

            <div class="tags">
                <span class="tag">網頁設計</span>
                <span class="tag">前端開發</span>
                <span class="tag">JavaScript</span>
                <span class="tag">資料分析</span>
            </div>
        </div>
    </div>
</div>

<div class="container">

    <div class="card contact">
        <div class="section-title">聯絡資訊</div>
        <p>電話：0912-345-678</p>
        <p>Email：example@email.com</p>
        <p>LinkedIn：linkedin.com/in/example</p>
    </div>

    <div class="card">
        <div class="section-title">技能</div>
        <ul>
            <li>HTML / CSS / JavaScript</li>
            <li>Python / Java</li>
            <li>React / Node.js</li>
        </ul>
    </div>

    <div class="card">
        <div class="section-title">教育背景</div>
        <ul>
            <li>亞洲大學 資訊工程學系</li>
            <li>某某高中</li>
        </ul>
    </div>

    <div class="card">
        <div class="section-title">工作經歷</div>
        <ul>
            <li>軟體開發實習生</li>
            <li>網頁設計實習生</li>
        </ul>
    </div>

</div>

</body>
</html>
